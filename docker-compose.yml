services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Compiled into Open Graph/Twitter metadata. Override in production via the host env.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
    ports:
      - "8080:3000"
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - web-network

networks:
  web-network:
    driver: bridge
