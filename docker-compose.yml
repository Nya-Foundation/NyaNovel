services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Optional canonical origin. Without it, NyaNovel uses Host/X-Forwarded-* per request.
      SITE_URL: ${SITE_URL:-}
    ports:
      - "8080:3000"
    restart: unless-stopped
    stop_grace_period: 10s
    networks:
      - web-network

networks:
  web-network:
    driver: bridge
